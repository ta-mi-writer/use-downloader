name: Connection Verification (with MissAV Plugin)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: '検証したい動画のURLを入力してください'
        required: true
        type: string

jobs:
  verify-connection:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. uv のセットアップ
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: '3.11'

      # 2. ffmpegのインストール（m3u8の結合に必要になります）
      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      # 3. yt-dlp と 外部プラグインを同時にインストールしてダウンロード実行
      - name: Run download with uv
        run: |
          uv run \
            --with yt-dlp \
            --with "git+https://github.com/smalltownjj/yt-dlp-plugin-missav.git" \
            verify.py "${{ github.event.inputs.video_url }}"

      # 4. ダウンロードされた動画ファイル（mp4）をGitHubに保存して手元で確認できるようにする
      - name: Upload downloaded video
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-video
          path: "*.mp4" # 拡張子がmp4のファイルをすべてアップロード
