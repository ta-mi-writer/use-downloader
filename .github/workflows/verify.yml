name: Connection Verification (with MissAV Plugin)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: '検証したい動画のURLを入力してください'
        required: true
        type: string
      video_quality:
        description: '画質を選択してください（デフォルトは 480p）'
        required: true
        type: choice
        default: '480p'
        options:
          - '1080p'
          - '720p'
          - '480p'
          - '360p'

jobs:
  verify-connection:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. uv のセットアップ
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: '3.11'

      # 2. ffmpegのインストール
      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      # 3. ダウンロードと指示書の自動作成を実行
      # これだけで、Actions環境の中に「kaggle_upload/video.mp4」と「kaggle_upload/dataset-metadata.json」が揃います
      - name: Run download and metadata generation
        run: |
          uv run \
            --with yt-dlp \
            --with "git+https://github.com/smalltownjj/yt-dlp-plugin-missav.git" \
            verify.py "${{ github.event.inputs.video_url }}" "${{ github.event.inputs.video_quality }}"

      # 4. 最新のKaggle認証ファイル（access_token）を自動作成
      - name: Authenticate Kaggle
        run: |
          mkdir -p ~/.kaggle
          echo "${{ secrets.KAGGLE_KEY }}" > ~/.kaggle/access_token
          chmod 600 ~/.kaggle/access_token

      # 5. Kaggleに新規データセットとしてアップロードする
      # ★ version ではなく create コマンドを実行します
      # デフォルトで非公開（Private）で作成されるため、第三者に見られる心配はありません。
      - name: Upload to Kaggle (New Dataset)
        run: |
          uv run --with kaggle kaggle datasets create -p kaggle_upload
