name: Connection Verification (with MissAV Plugin)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: '検証したい動画のURLを入力してください'
        required: true
        type: string
      video_quality:
        description: '画質を選択してください（デフォルトは 480p）'
        required: true
        type: choice
        default: '480p'
        options:
          - '1080p'
          - '720p'
          - '480p'
          - '360p'

jobs:
  verify-connection:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. uv のセットアップ
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: '3.11'

      # 2. ffmpegのインストール
      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      # 3. ダウンロード実行
      - name: Run download with uv
        run: |
          uv run \
            --with yt-dlp \
            --with "git+https://github.com/smalltownjj/yt-dlp-plugin-missav.git" \
            verify.py "${{ github.event.inputs.video_url }}" "${{ github.event.inputs.video_quality }}"

      # 4. 【追加】Kaggle転送用の専用一時フォルダを準備する
      # 動画ファイル（mp4）と、リポジトリに保存されている指示書（dataset-metadata.json）だけを集めます
      - name: Prepare Kaggle upload directory
        run: |
          mkdir kaggle_upload
          cp dataset-metadata.json kaggle_upload/
          mv *.mp4 kaggle_upload/

      # 5. 【追加】Kaggleに新しいバージョンとして動画を転送する
      # シークレット（USERNAMEとKEY）を環境変数に安全にセットして、Kaggle CLIを実行します
      - name: Upload to Kaggle
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          uv run --with kaggle kaggle datasets version \
            -p kaggle_upload \
            -m "Uploaded by GitHub Actions" \
            --dir-mode skip

      # （参考：Kaggleへの転送が成功すれば、GitHub上に重い動画を残しておく必要がなくなるため、
      #   以前の "Upload downloaded video" のステップは削除しても問題ありません）
