name: Connection Verification (with MissAV Plugin)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: '検証したい動画のURLを入力してください'
        required: true
        type: string

jobs:
  verify-connection:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. uv のセットアップとキャッシュの有効化
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: '3.11'

      # 2. yt-dlp と 外部プラグインを同時に一時インストールして実行
      # "--with" 引数を2つ重ねることで、両方のパッケージを内包した一時環境でスクリプトが動きます
      - name: Run verification with uv
        run: |
          uv run \
            --with yt-dlp \
            --with "git+https://github.com/smalltownjj/yt-dlp-plugin-missav.git" \
            verify.py "${{ github.event.inputs.video_url }}"

      # 3. 取得したテキストファイルをGitHubに保存（検証が成功した場合のみ実行されます）
      - name: Upload verification result
        uses: actions/upload-artifact@v4
        with:
          name: video-metadata-result
          path: video_info.txt
