name: Connection Verification (with MissAV Plugin)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: '検証したい動画のURLを入力してください'
        required: true
        type: string
      video_quality:
        description: '画質を選択してください（デフォルトは 480p）'
        required: true
        type: choice
        default: '480p'
        options:
          - '1080p'
          - '720p'
          - '480p'
          - '360p'

jobs:
  verify-connection:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. uv のセットアップ
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: '3.11'

      # 2. ffmpegのインストール
      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      # 3. ダウンロード実行
      - name: Run download with uv
        run: |
          uv run \
            --with yt-dlp \
            --with "git+https://github.com/smalltownjj/yt-dlp-plugin-missav.git" \
            verify.py "${{ github.event.inputs.video_url }}" "${{ github.event.inputs.video_quality }}"

      # 4. 【追加】Kaggle転送用の専用一時フォルダを準備する
      # 動画ファイル（mp4）と、リポジトリに保存されている指示書（dataset-metadata.json）だけを集めます
      - name: Prepare Kaggle upload directory
        run: |
          mkdir kaggle_upload
          cp dataset-metadata.json kaggle_upload/
          mv *.mp4 kaggle_upload/

      # 5. 【修正】最新のKaggle認証ファイル（access_token）を物理的に自動作成する
      # ユーザー様がVPSで実行された「access_token」の手順と全く同じ動作を再現します
      - name: Authenticate Kaggle
        run: |
          mkdir -p ~/.kaggle
          echo "${{ secrets.KAGGLE_KEY }}" > ~/.kaggle/access_token
          chmod 600 ~/.kaggle/access_token

      # 6. Kaggleに新しいバージョンとして動画を転送する
      - name: Upload to Kaggle
        run: |
          uv run --with kaggle kaggle datasets version \
            -p kaggle_upload \
            -m "Uploaded by GitHub Actions" \
            --dir-mode skip
